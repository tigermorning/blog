name: Publish scheduled drafts

on:
  schedule:
    # 20분마다 실행을 "틱"으로 확인만 하고, 실제 발행 여부와 간격은
    # publish-drafts.sh가 대기열 개수를 보고 그때그때 계산합니다
    # (최소 1시간 간격, 대기열에 있는 시리즈가 KST 09:00~24:00 안에 다 발행되도록).
    - cron: '*/20 * * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Publish next queued draft
        run: bash .github/scripts/publish-drafts.sh
