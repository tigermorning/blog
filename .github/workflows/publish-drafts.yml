name: Publish scheduled drafts

on:
  schedule:
    - cron: '0 0 * * *'    # 한국시간(KST) 09:00 — 대기열에서 1개 발행
    - cron: '0 6 * * *'    # 한국시간(KST) 15:00 — 대기열에서 1개 발행
    - cron: '0 12 * * *'   # 한국시간(KST) 21:00 — 대기열에서 1개 발행
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Publish next queued draft
        run: bash .github/scripts/publish-drafts.sh
