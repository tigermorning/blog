name: Publish scheduled drafts

on:
  schedule:
    - cron: '0 0 * * *'    # 한국시간(KST) 09:00 — 대기열에서 1개 발행
    - cron: '0 6 * * *'    # 한국시간(KST) 15:00 — 대기열에서 1개 발행
    - cron: '0 12 * * *'   # 한국시간(KST) 21:00 — 대기열에서 1개 발행
    - cron: '0 1 13 7 *'   # 2026-07-13 한정 예외: KST 10:00 — API/AI 토큰 글이 짧아서 이날만 4개 발행 (1번-2번 사이 1시간 간격). 지나면 이 줄 삭제할 것
    - cron: '0 16 13 7 *'  # 2026-07-13 한정 예외: KST 01:00(7/14) — 분량 적은 글 7개를 1시간 간격으로 몰아서 발행 (2/8). 지나면 이 줄 삭제할 것
    - cron: '0 17 13 7 *'  # 2026-07-13 한정 예외: KST 02:00(7/14) (3/8). 지나면 이 줄 삭제할 것
    - cron: '0 18 13 7 *'  # 2026-07-13 한정 예외: KST 03:00(7/14) (4/8). 지나면 이 줄 삭제할 것
    - cron: '0 19 13 7 *'  # 2026-07-13 한정 예외: KST 04:00(7/14) (5/8). 지나면 이 줄 삭제할 것
    - cron: '0 20 13 7 *'  # 2026-07-13 한정 예외: KST 05:00(7/14) (6/8). 지나면 이 줄 삭제할 것
    - cron: '0 21 13 7 *'  # 2026-07-13 한정 예외: KST 06:00(7/14) (7/8). 지나면 이 줄 삭제할 것
    - cron: '0 22 13 7 *'  # 2026-07-13 한정 예외: KST 07:00(7/14) (8/8). 지나면 이 줄 삭제할 것
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Publish next queued draft
        run: bash .github/scripts/publish-drafts.sh
