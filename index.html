  <link rel="stylesheet" href="style.css">
  <script>
    (function () {
      var lang = (navigator.language || navigator.userLanguage || "en").toLowerCase();
      var target = "en/";
      if (lang.indexOf("ko") === 0) {
        target = "ko/";
      } else if (lang.indexOf("zh") === 0) {
        target = "zh/";
      }
      window.location.replace(target);
    })();
  </script>
</head>
<body>

    </p>
  </main>

  <footer class="site-footer">

</body>
</html>
