<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>글 관리 (비공개) - Tigermorning</title>
  <meta name="robots" content="noindex, nofollow">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="../style.css">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a class="site-title" href="/blog/">Tigermorning</a>
    </div>
  </header>

  <main>
    <h1>글 관리</h1>
    <p>이 페이지는 공개 목록이 아니라 관리자(나)만 보는 페이지예요. 사이트 어디에도 이 페이지로 가는 링크가 없고, 검색엔진에도 노출되지 않도록 설정되어 있어요.</p>

    <h2>예약 대기중</h2>
    <div id="queue-list">불러오는 중...</div>

    <h2>발행됨</h2>
    <div id="published-list">불러오는 중...</div>
  </main>

  <footer class="site-footer">
    &copy; 2026 Tigermorning
  </footer>

  <script>
    const REPO = 'tigermorning/blog';
    const LANGS = ['ko', 'en', 'zh'];

    async function ghApi(path) {
      try {
        const res = await fetch(`https://api.github.com/repos/${REPO}/contents/${path}`);
        if (!res.ok) return null;
        return await res.json();
      } catch (e) {
        return null;
      }
    }

    function b64DecodeUtf8(base64) {
      return decodeURIComponent(escape(atob(base64.replace(/\n/g, ''))));
    }

    async function fetchRaw(path) {
      try {
        const res = await fetch(`https://raw.githubusercontent.com/${REPO}/main/${path}`);
        if (!res.ok) return null;
        return await res.text();
      } catch (e) {
        return null;
      }
    }

    function extractTitle(html, fallback) {
      if (!html) return fallback;
      const m = html.match(/<h1[^>]*>([\s\S]*?)<\/h1>/i);
      if (!m) return fallback;
      return m[1].replace(/<[^>]+>/g, '').trim();
    }

    // 한국시간(KST) 기준 09/15/21시 슬롯 중, 지금 이후로 남은 슬롯을 n개 계산
    function nextSlotsKST(n) {
      const hours = [9, 15, 21];
      const nowKST = new Date(new Date().toLocaleString('en-US', { timeZone: 'Asia/Seoul' }));
      const results = [];
      let dayOffset = 0;
      while (results.length < n) {
        const base = new Date(nowKST);
        base.setDate(base.getDate() + dayOffset);
        base.setHours(0, 0, 0, 0);
        for (const h of hours) {
          const slot = new Date(base);
          slot.setHours(h, 0, 0, 0);
          if (slot > nowKST) {
            results.push(slot);
            if (results.length === n) break;
          }
        }
        dayOffset++;
      }
      return results;
    }

    function fmtKST(d) {
      const mm = d.getMonth() + 1;
      const dd = d.getDate();
      const hh = String(d.getHours()).padStart(2, '0');
      return `${mm}월 ${dd}일 ${hh}시`;
    }

    async function loadQueue() {
      const el = document.getElementById('queue-list');

      const data = await ghApi('_drafts/queue.txt');
      const queuedLines = (data && data.content)
        ? b64DecodeUtf8(data.content).split('\n').map(l => l.trim()).filter(Boolean)
        : [];

      // _drafts 안의 모든 초안 파일 (큐에 있든 없든 전부)
      let allDrafts = [];
      for (const lang of LANGS) {
        const files = await ghApi(`_drafts/${lang}`);
        if (files && Array.isArray(files)) {
          for (const f of files) {
            if (f.name.endsWith('.html')) allDrafts.push(`${lang}/${f.name}`);
          }
        }
      }
      const notQueued = allDrafts.filter(p => !queuedLines.includes(p));

      let html = '';

      if (queuedLines.length > 0) {
        const slots = nextSlotsKST(queuedLines.length);
        const items = await Promise.all(queuedLines.map(async (line, i) => {
          const raw = await fetchRaw(`_drafts/${line}`);
          const title = extractTitle(raw, line);
          return `<li><strong>${title}</strong><br><span style="color:var(--muted)">${line} — 예상 발행: ${fmtKST(slots[i])} (KST)</span></li>`;
        }));
        html += '<h3>발행 순서 확정 (큐 등록됨)</h3><ol>' + items.join('') + '</ol>';
      } else {
        html += '<h3>발행 순서 확정 (큐 등록됨)</h3><p>큐에 등록된 글이 없습니다.</p>';
      }

      if (notQueued.length > 0) {
        const items2 = await Promise.all(notQueued.map(async (path) => {
          const raw = await fetchRaw(`_drafts/${path}`);
          const title = extractTitle(raw, path);
          return `<li><strong>${title}</strong> <span style="color:var(--muted)">— ${path} (작성됨, 아직 큐에 등록 안 됨)</span></li>`;
        }));
        html += '<h3>작성됨 · 큐 대기 중</h3><ul>' + items2.join('') + '</ul>';
      }

      el.innerHTML = html;
    }

    async function loadPublished() {
      const el = document.getElementById('published-list');
      let html = '';
      for (const lang of LANGS) {
        const files = await ghApi(lang);
        if (!files || !Array.isArray(files)) continue;
        const posts = files.filter(f => f.name.endsWith('.html') && f.name !== 'index.html');
        if (posts.length === 0) continue;
        const items = await Promise.all(posts.map(async (f) => {
          const raw = await fetchRaw(`${lang}/${f.name}`);
          const title = extractTitle(raw, f.name);
          return `<li><a href="../${lang}/${f.name}" target="_blank" rel="noopener">${title}</a></li>`;
        }));
        html += `<h3>${lang}</h3><ul>${items.join('')}</ul>`;
      }
      el.innerHTML = html || '<p>발행된 글이 없습니다.</p>';
    }

    loadQueue();
    loadPublished();
  </script>
</body>
</html>
