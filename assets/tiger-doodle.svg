<svg viewBox="0 0 200 180" xmlns="http://www.w3.org/2000/svg" width="88" height="80">
  <defs>
    <filter id="crayon" x="-30%" y="-30%" width="160%" height="160%">
      <feTurbulence type="fractalNoise" baseFrequency="0.045" numOctaves="2" seed="7" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="6"/>
    </filter>
  </defs>

  <g filter="url(#crayon)">
    <!-- ears -->
    <path d="M45 55 C40 25, 70 20, 78 48 Z" fill="#d97a42"/>
    <path d="M155 55 C160 25, 130 20, 122 48 Z" fill="#d97a42"/>
    <path d="M52 50 C50 35, 65 32, 70 46 Z" fill="#f7ecd9"/>
    <path d="M148 50 C150 35, 135 32, 130 46 Z" fill="#f7ecd9"/>

    <!-- face -->
    <ellipse cx="100" cy="100" rx="62" ry="55" fill="#e8935a"/>
    <ellipse cx="100" cy="112" rx="32" ry="26" fill="#f7ecd9"/>

    <!-- stripes -->
    <path d="M55 70 C65 78, 70 82, 60 90" stroke="#7a4426" stroke-width="5" fill="none" stroke-linecap="round"/>
    <path d="M145 70 C135 78, 130 82, 140 90" stroke="#7a4426" stroke-width="5" fill="none" stroke-linecap="round"/>
    <path d="M100 58 C100 66, 100 70, 100 76" stroke="#7a4426" stroke-width="5" fill="none" stroke-linecap="round"/>
    <path d="M70 60 C76 66, 78 70, 74 76" stroke="#7a4426" stroke-width="4" fill="none" stroke-linecap="round"/>
    <path d="M130 60 C124 66, 122 70, 126 76" stroke="#7a4426" stroke-width="4" fill="none" stroke-linecap="round"/>

    <!-- eyes -->
    <circle cx="82" cy="98" r="6" fill="#4a3324"/>
    <circle cx="118" cy="98" r="6" fill="#4a3324"/>

    <!-- nose + mouth -->
    <path d="M92 112 C96 108, 104 108, 108 112 C104 118, 96 118, 92 112 Z" fill="#b3543c"/>
    <path d="M100 116 C100 122, 100 124, 100 126" stroke="#7a4426" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M100 126 C94 132, 86 130, 82 124" stroke="#7a4426" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M100 126 C106 132, 114 130, 118 124" stroke="#7a4426" stroke-width="3" fill="none" stroke-linecap="round"/>

    <!-- whiskers -->
    <path d="M60 108 C45 106, 35 106, 25 104" stroke="#7a4426" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M60 116 C45 118, 35 120, 25 122" stroke="#7a4426" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M140 108 C155 106, 165 106, 175 104" stroke="#7a4426" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M140 116 C155 118, 165 120, 175 122" stroke="#7a4426" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  </g>
</svg>
