<svg viewBox="0 0 400 320" xmlns="http://www.w3.org/2000/svg" width="420" height="336">
  <defs>
    <filter id="raw" x="-50%" y="-50%" width="200%" height="200%">
      <feTurbulence type="turbulence" baseFrequency="0.02 0.08" numOctaves="4" seed="42" result="warp"/>
      <feDisplacementMap in="SourceGraphic" in2="warp" scale="18"/>
    </filter>
    <filter id="scratch" x="-60%" y="-60%" width="220%" height="220%">
      <feTurbulence type="turbulence" baseFrequency="0.03 0.12" numOctaves="3" seed="17" result="w"/>
      <feDisplacementMap in="SourceGraphic" in2="w" scale="12"/>
    </filter>
  </defs>

  <!-- 낡은 캔버스/원지 색 배경 -->
  <rect x="0" y="0" width="400" height="320" fill="#e9dfc6"/>

  <!-- 거칠게 겹쳐 붙인 색 블록들 -->
  <g filter="url(#raw)" opacity="0.9">
    <rect x="15" y="20" width="150" height="90" fill="#e8c33a" transform="rotate(-4 90 65)"/>
    <rect x="230" y="180" width="160" height="110" fill="#1c1c1c" transform="rotate(3 310 235)"/>
    <rect x="240" y="15" width="120" height="70" fill="#c8352b" transform="rotate(6 300 50)"/>
  </g>

  <!-- 왕관 -->
  <g filter="url(#scratch)" stroke="#151109" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M150 70 L165 30 L185 58 L200 25 L215 58 L235 30 L250 70 Z"/>
  </g>
  <g filter="url(#raw)">
    <path d="M150 70 L165 30 L185 58 L200 25 L215 58 L235 30 L250 70 Z" fill="#e8c33a" opacity="0.6"/>
  </g>

  <!-- 호랑이: 원시적이고 거친 선 드로잉 -->
  <g filter="url(#scratch)" stroke="#151109" stroke-width="7" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- 얼굴 윤곽 (일부러 비대칭, 삐뚤게) -->
    <path d="M130 100 C110 130, 108 170, 130 200 C150 228, 250 232, 275 200 C298 172, 292 128, 268 100 C240 76, 165 74, 130 100 Z"/>
    <!-- 줄무늬 (거친 획) -->
    <path d="M150 100 C158 118, 150 130, 140 140"/>
    <path d="M255 100 C247 118, 255 130, 265 140"/>
    <path d="M200 90 C200 105, 205 118, 198 130"/>
    <!-- 눈 (좌우 비대칭, 원시적) -->
    <path d="M155 148 L175 145 L172 162 L152 164 Z"/>
    <path d="M225 150 L248 146 L250 164 L228 166 Z"/>
    <circle cx="163" cy="155" r="5" fill="#151109" stroke="none"/>
    <circle cx="238" cy="156" r="5" fill="#151109" stroke="none"/>
    <!-- 코/이빨 (드러난 느낌) -->
    <path d="M185 178 L200 172 L215 178 L210 195 L200 200 L190 195 Z"/>
    <path d="M188 195 L192 210 M196 197 L198 214 M204 197 L206 214 M212 195 L208 210"/>
    <!-- 수염 -->
    <path d="M125 175 L85 168 M125 185 L82 190"/>
    <path d="M280 175 L318 168 M280 185 L320 190"/>
  </g>

  <!-- 색 채움 (거칠게, 윤곽 밖으로 삐져나오게) -->
  <g filter="url(#raw)" opacity="0.85">
    <path d="M140 110 C122 136, 122 168, 140 192 C156 214, 245 216, 265 192 C284 168, 278 132, 258 110 C232 90, 168 88, 140 110 Z" fill="#d9711f"/>
  </g>

  <!-- 낙서 텍스트: TIGER 취소선 + MORNING -->
  <g filter="url(#scratch)">
    <text x="30" y="255" font-family="Arial Black, Arial, sans-serif" font-size="34" font-weight="900" fill="#151109" letter-spacing="1">TIGER</text>
    <line x1="24" y1="243" x2="128" y2="243" stroke="#c8352b" stroke-width="5"/>
    <text x="130" y="255" font-family="Arial Black, Arial, sans-serif" font-size="34" font-weight="900" fill="#151109" letter-spacing="1">MORNING</text>
    <text x="30" y="300" font-family="Arial Black, Arial, sans-serif" font-size="20" font-weight="900" fill="#151109">© 신서연</text>
  </g>
</svg>
